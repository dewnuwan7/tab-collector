<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tab Collector</title>

  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">

    <header class="header">
      <div class="header-left">
        <div class="logo-mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="#09090b"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="#09090b" opacity="0.4"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="#09090b" opacity="0.4"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="#09090b" opacity="0.15"/>
          </svg>
        </div>
        <span class="title">Tab Collector</span>
      </div>
      <span class="tab-count" id="tabCount">0 tabs</span>
    </header>

    <div class="toolbar">
      <label class="select-all-wrap">
        <input type="checkbox" id="selectAll" />
        <span class="custom-check"></span>
        <span class="select-label">Select all</span>
      </label>
      <span class="selected-label" id="selectedCount">0 selected</span>
    </div>

    <div class="tab-list" id="tabList">
      <div class="loading">
        <div class="spinner"></div>
        <span>Loading tabs…</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-copy" id="copyBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Copy Links
      </button>
      <button class="btn btn-save" id="saveBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8m0 0l-3-3m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Save .txt
      </button>
    </div>

    <div class="toast" id="toast"></div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
